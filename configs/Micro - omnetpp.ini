[General]
image-path=./../../images
output-scalar-file-append = false
**.routingRecorder.enabled = false

############### Statistics ##################
#output-scalar-file = ${resultdir}/${configname}/${iterationvars}-${repetition}.sca
output-scalar-file = ${resultdir}/${configname}.sca
#output-vector-file = ${resultdir}/${configname}.vec
seed-set = ${repetition}
**.sctp.**.scalar-recording = false  # remove annoying statistics from SCTP
**.sctp.**.vector-recording = false  # remove annoying statistics from SCTP
**.vector-recording = false

############### SCTP configuration ##################
**.sctp.nagleEnabled = false         # if true, transmission of small packets will be delayed on the X2
**.sctp.enableHeartbeats = false

############### General PHY parameters ##############
**.downlink_interference = true
**.uplink_interference = true
**.ueTxPower = 26dBm
**.eNodeBTxPower = 50dBm
**.targetBler = 0.01
**.blerShift = 5  
**.fbPeriod = 40tti   # reports CQI every 40ms


############### IPv4 configurator config #################
*.configurator.config = xmldoc("./demo.xml")


#------------------------------------#
# Config MultiCell
#
# General configuration for the for a multicell NR Standalone deployment
#
[Config MICROCELL]
network = MultiCell_Standalone
sim-time-limit=1200s
#description = "Base configuration, do not run this config!"
**.scenario = "URBAN_MICROCELL"

############# Floorplan parameters ################
**.mobility.constraintAreaMaxX = 1840m 
**.mobility.constraintAreaMaxY = 920m 
**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m
**.mobility.initFromDisplayString = false

############### CA configuration ################# 
*.carrierAggregation.numComponentCarriers = 1
*.carrierAggregation.componentCarrier[0].numerologyIndex = ${u=2}
*.carrierAggregation.componentCarrier[0].carrierFrequency = 24GHz
*.carrierAggregation.componentCarrier[0].numBands = ${numRbs=275}

*.gnb*.cellularNic.numCarriers = 1
*.gnb*.cellularNic.channelModel[0].componentCarrierIndex = 0
*.ue[*].cellularNic.numCarriers = 1
*.ue[*].cellularNic.nrChannelModel[0].componentCarrierIndex = 0

############### BS position #################
*.gnb1.mobility.initialX = 460m
*.gnb1.mobility.initialY = 460m
*.gnb2.mobility.initialX = 1380m
*.gnb2.mobility.initialY = 460m

############### X2 configuration #################
*.gnb*.numX2Apps = 1                                        # one x2App per peering node
*.gnb*.x2App[*].server.localPort = 5000 + ancestorIndex(1)  # Server ports (x2App[0]=5000, x2App[1]=5001, ...)
*.gnb1.x2App[0].client.connectAddress = "gnb2%x2ppp0" 
*.gnb2.x2App[0].client.connectAddress = "gnb1%x2ppp0" 

############## UE configuration ##################
*.numUe = ${numUEs=142}

# UEs associates to the best BS at the beginning of the simulation
*.ue[*].macCellId = 0
*.ue[*].masterId = 0
*.ue[*].nrMacCellId = 1
*.ue[*].nrMasterId = 1
**.dynamicCellAssociation = true
**.enableHandover = true

############ UEs position #################
*.ue[*].mobility.typename = "LinearMobility"
*.ue[*].mobility.initialX = uniform(0m,1840m)
*.ue[*].mobility.initialY = uniform(0m,920m)
*.ue[*].mobility.speed = uniform(3mps,13.89mps) 
#------------------------------------#



#------------------------------------#
# Config CBR-DL
#
# Configuration with CBR DL traffic from a remote server to the UEs
# 

*.ue[*].numApps = 2

# the amount of UDP applications on server should be equal to (numUEs)*(ue[*].numApps) 
*.CBR_Server.numApps = 30
*.VoIP_Server.numApps = 30

#============= Application Setup =============
*.ue[*].app[0].typename = "CbrReceiver"
*.ue[*].app[0].localPort = 3000

*.CBR_Server.app[*].typename = "CbrSender"
*.CBR_Server.app[*].PacketSize = 1000
*.CBR_Server.app[*].sampling_time = 0.02s
*.CBR_Server.app[*].destAddress = "ue[" + string(ancestorIndex(0)) + "]"
*.CBR_Server.app[*].destPort = 3000 
*.CBR_Server.app[*].localPort = 3088+ancestorIndex(0) 
*.CBR_Server.app[*].startTime = uniform(0s,0.02s)
*.CBR_Server.app[*].finishTime = uniform(1199.9s,1199.92s)
#
##------------------------------------#


# one UDP application for each user
#*.ue[*].numApps = 1

# the amount of UDP applications on server should be equal to (numUEs)*(ue[*].numApps) 
#*.server.numApps = = ${numUEs}

##============= Application Setup =============
*.ue[*].app[1].typename = "VoIPReceiver"
*.ue[*].app[1].localPort = 4000

*.VoIP_Server.app[*].PacketSize = 100
*.VoIP_Server.app[*].destAddress = "ue[" + string(ancestorIndex(0)) + "]" # obtain the address of the client by reading its index in the array of udp Apps
*.VoIP_Server.app[*].destPort = 4000
*.VoIP_Server.app[*].localPort = 4088+ancestorIndex(0) 
*.VoIP_Server.app[*].typename = "VoIPSender"
*.VoIP_Server.app[*].startTime = uniform(0s,0.02s)
*.VoIP_Server.app[*].finishTime = uniform(1199.9s,1199.92s)

#------------------------------------#
